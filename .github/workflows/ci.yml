name: CI — Tests moteur GexScore

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          # AJOUTÉ le 22/07/2026 (intégration Sentry) : installe aussi les
          # dépendances de api/main.py (fastapi, sentry-sdk, etc.) pour que
          # tests/test_api_main.py puisse importer le module complet en CI
          # (smoke test) — auparavant seul engine/ était testé, api/main.py
          # n'était jamais réellement importé avant le déploiement Vercel.
          pip install -r api/requirements.txt

      - name: Run pytest (moteur engine/ + api/)
        run: |
          python -m pytest tests/ -v
