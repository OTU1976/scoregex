# ═══════════════════════════════════════════════════════════════════
# GexScore — Configuration Zone : Pays de Gex (Zone 001)
# Steelldy SAS — Juillet 2026
# PRINCIPE : Tout ce qui change entre zones EST ici.
#            Tout ce qui est universel EST dans le code.
# Pour cloner vers Annemasse : copier ce fichier → zones/002_annemasse.yaml
# ═══════════════════════════════════════════════════════════════════

zone_id: "gex_001"
zone_name: "Pays de Gex"
zone_description: "8 communes frontalières Ain — Genève"
version: "3.0.0"
active: true

# ── Communes incluses ────────────────────────────────────────────────
communes:
  "01012": "Cessy"
  "01123": "Ferney-Voltaire"
  "01194": "Gex"
  "01200": "Prevessin-Moens"
  "01283": "Ornex"
  "01307": "Saint-Genis-Pouilly"
  "01423": "Sergy"
  "01446": "Thoiry"

# ── Bounding Box PostGIS (lon_min, lat_min, lon_max, lat_max) ────────
bbox:
  lon_min: 5.88
  lat_min: 46.10
  lon_max: 6.28
  lat_max: 46.38

# ── Point de référence frontalier (Genève Cornavin) ──────────────────
reference_point:
  name: "Genève Cornavin"
  lon: 6.1432
  lat: 46.2017

# ── Paramètres SAR (Spatial Autoregressive) ─────────────────────────
# rho calibré sur DVF Gex 2014-2026 (Queen Contiguity, MLE)
sar:
  rho: 0.34
  bandwidth_km: 2.0         # Rayon voisinage pour matrice W
  kernel: "inverse_distance" # "queen_contiguity" | "inverse_distance"

# ── Paramètres GWR (Geographically Weighted Regression) ─────────────
gwr:
  bandwidth: 0.05            # Bandwidth kernel gaussien (degrés)
  lat_center: 46.21
  lon_center: 6.06

# ── Coefficients hédoniques locaux ───────────────────────────────────
# ATTENTION HONNÊTETÉ (17/07/2026) : l'en-tête "calibrés DVF 2014-2026"
# ci-dessus est historiquement inexact pour TOUS les coefficients de ce
# bloc — seuls dpe_per_class (approx. littérature DPE France) et,
# depuis aujourd'hui, terrain_surface_beta ET distance_gva_per_min (voir
# ci-dessous) ont réellement été vérifiés contre les transactions DVF
# réelles de la zone. bruit_a40_penalty, vue_leman_bonus, ecole_intl_bonus,
# desert_medical_penalty, frontalier_premium_max, ndvi_bonus_per_unit
# restent des VALEURS D'ORIGINE NON RE-VÉRIFIÉES à ce stade — à auditer
# un jour de la même façon (roadmap, pas urgent, mais à ne pas oublier).
hedonic_betas:
  dpe_per_class: -0.148      # beta log-prix par classe DPE (C=réf.)

  # ── Distance Genève — RECALIBRÉ le 17/07/2026 suite à un signal fort
  # d'Helen (la pénalité -47.6% sur le cas Rogeland/Gex, 32 min, lui
  # semblait irréaliste vu la demande Grand Genève sur les 8 communes).
  # Elle avait raison : -0.028/min N'AVAIT JAMAIS ÉTÉ CALIBRÉ sur les
  # vraies transactions Maison — c'était une valeur d'origine du projet,
  # jamais vérifiée, malgré l'en-tête de section qui la présentait comme
  # "calibrée DVF". Root cause distincte du garde-fou ±35% (qui, lui,
  # protège contre un compounding log-linéaire — ici le problème est en
  # amont : LE COEFFICIENT LUI-MÊME était faux).
  #
  # MÉTHODOLOGIE (calcul réel, exécuté le 17/07/2026 via Supabase MCP +
  # extension Postgres `http` temporaire pour géocoder les 8 mairies via
  # l'API BAN gratuite et calculer un vrai temps de trajet OSRM vers
  # Genève-Cornavin pour chacune, comme le fait déjà score_frontalier.py
  # pour un bien individuel) :
  #   - Régression : ln(prix_m2) = alpha + beta1*ln(surface_terrain) +
  #     beta2*ln(surface_reelle_bati) + beta3*gva_min, sur les 196
  #     transactions Maison réelles (remplace les effets fixes commune
  #     par la variable continue gva_min, pour pouvoir précisément
  #     l'identifier — un effet fixe commune aurait absorbé toute la
  #     variation, gva_min étant quasi constant par commune).
  #   - Résultat : beta3 (distance_gva_per_min) = -0.00305 (SE naïve
  #     0.00486, t=-0.63) — un ORDRE DE GRANDEUR plus petit que l'ancien
  #     -0.028, et statistiquement NON distinguable de zéro.
  #   - ⚠️ LIMITE HONNÊTE IMPORTANTE : gva_min ne prend que 8 valeurs
  #     distinctes (une par commune) répétées sur 196 lignes — l'échantillon
  #     RÉEL pour identifier cet effet est proche de n=8 (communes), pas
  #     n=196 (transactions). L'écart-type calculé ci-dessus SOUS-ESTIME
  #     donc probablement l'incertitude réelle (problème classique de
  #     régression sur variable groupée). Conclusion honnête : les
  #     données ne permettent PAS d'affirmer avec certitude qu'il existe
  #     un effet distance différent de zéro DANS cette zone restreinte
  #     (16-30 min pour les 8 communes) — exactement l'intuition d'Helen
  #     (le Pays de Gex entier profite de la demande Grand Genève,
  #     l'écart Ferney/Gex ne se reflète pas clairement dans les prix
  #     bruts : Cessy, la commune la PLUS chère du jeu de données à
  #     5478 EUR/m2, est aussi l'une des plus éloignées à 25 min).
  #   - Décision : mis à 0.0 plutôt que de garder -0.028 (non supporté)
  #     ou d'imposer -0.003 avec une fausse précision (non significatif).
  #     À réévaluer si/quand la zone s'étend (Annemasse, etc.) et que la
  #     variation de distance devient plus large et mieux identifiable.
  distance_gva_per_min: 0.0
  threshold_gva_min: 15.0    # Minutes — conservé (sans effet si beta=0), utile si beta3 réévalué plus tard
  bruit_a40_penalty: -0.163  # Si bruit LDEN > 65 dB
  bruit_gva_penalty: -0.082  # Si bruit avions GVA > 55 dB
  vue_leman_bonus: 0.112     # Proxy altitude IGN > 520m
  ecole_intl_bonus: 0.071    # École internationale < 500m
  desert_medical_penalty: -0.089  # 0 médecin < 10min
  frontalier_premium_max: 0.187   # Premium max (Ferney/Cessy)
  ndvi_bonus_per_unit: 0.04  # NDVI > 0.4 → +4% (Planet Labs)

  # ── Surface du terrain (Maison uniquement) — AJOUTÉ le 17/07/2026 ──
  # FEU VERT explicite d'Helen (17/07/2026) : coefficient RÉELLEMENT
  # calibré par régression sur les vraies transactions Maison en base
  # (Supabase, table `biens`, pipeline DVF DGFiP 2025) — PAS une valeur
  # inventée, conformément au principe "pas de donnée fictive" du projet.
  #
  # MÉTHODOLOGIE (calcul exécuté en direct via Supabase MCP, SQL, le
  # 17/07/2026 — regr_slope/regr_intercept + résolution manuelle du
  # système normal à 2 régresseurs, Postgres n'ayant pas d'agrégat de
  # régression multivariée natif) :
  #   - Échantillon : 196 des 198 transactions Maison réelles avec
  #     surface_terrain connue (2 exclues : bornes 50-3000 m² pour
  #     retirer 2 valeurs implausibles, ex. micro-parcelles < 50m²),
  #     couvrant les 8 communes du Pays de Gex.
  #   - Modèle : ln(prix_m2) = alpha_commune + beta_terrain*ln(surface_terrain)
  #     + beta_bati*ln(surface_reelle_bati), estimé par effets fixes
  #     commune (démeaning intra-groupe, équivalent Frisch-Waugh-Lovell).
  #   - Résultat : beta_terrain = +0.152 (SE=0.0315, t=4.84, p<0.001,
  #     n=196, 8 communes) — statistiquement très significatif.
  #   - beta_bati (contrôle, pour mémoire) = -0.723 (t=-13.2) : les
  #     maisons plus grandes ont un prix/m² plus faible ("size discount"),
  #     un effet immobilier classique et attendu, pas une anomalie.
  #   - ⚠️ POINT MÉTHODOLOGIQUE IMPORTANT (transparence totale) : la
  #     régression NAÏVE (sans effets fixes commune ni contrôle taille)
  #     donne un coefficient de signe INVERSE (-0.094, R²=0.036) — un
  #     Simpson's paradox classique : les communes moins chères (ex.
  #     Sergy, ~3941 EUR/m2) ont en moyenne des terrains plus grands que
  #     les communes plus chères (ex. Cessy/Ferney), donc une corrélation
  #     brute confond "commune" et "surface terrain". Seule la version à
  #     effets fixes isole le vrai effet, positif, du foncier à commune
  #     et taille de bien comparables. Ne jamais utiliser le coefficient
  #     naïf — le beta_terrain ci-dessous EST la version corrigée.
  terrain_surface_beta: 0.152
  # Référence de secours si la vue Supabase v_prix_marche_maisons (colonne
  # surface_terrain_mediane, par commune, calculée en direct sur les
  # mêmes données réelles) est indisponible — médiane poolée des 8
  # communes du même échantillon de 196 lignes (calcul réel, pas un
  # chiffre rond choisi arbitrairement).
  terrain_reference_defaut_m2: 792.5

# ── Paramètres Merton Jump-Diffusion ────────────────────────────────
merton:
  mu: 0.032          # Drift annuel moyen Gex (DVF calibré)
  sigma_base: 0.094  # Volatilité diffusion
  lambda_poisson: 0.42  # Sauts / an
  mu_jump: 0.07      # Espérance amplitude saut
  sigma_jump: 0.14   # Vol. amplitude saut
  rho_chf: 0.41      # Sensibilité vol. CHF/EUR
  rho_regime_stress: 0.83

# ── Paramètres HMM (Hidden Markov Model) ────────────────────────────
hmm:
  n_states: 4
  state_names: ["expansion", "plateau", "correction", "stress"]
  state_probs_stationary: [0.58, 0.27, 0.11, 0.04]
  drift_by_state: [0.018, 0.003, -0.008, -0.021]
  vol_by_state: [0.021, 0.014, 0.032, 0.058]
  # Matrice de transition 4x4
  transition_matrix:
    - [0.82, 0.14, 0.03, 0.01]
    - [0.35, 0.55, 0.08, 0.02]
    - [0.20, 0.30, 0.42, 0.08]
    - [0.10, 0.15, 0.30, 0.45]

# ── Pondérations Score GexScore ──────────────────────────────────────
# Somme = 1.0 — optimisées walk-forward 2023-2026
score_weights:
  w_spatial: 0.28
  w_frontalier: 0.34
  w_esg: 0.17
  w_regime: 0.12
  w_quantum: 0.09   # Tensor Networks / QUBO (activé en Phase 2)

# Pondérations sous-score Frontalier
frontalier_weights:
  w_gva: 0.40
  w_medical: 0.25
  w_bruit: 0.20
  w_services: 0.15

# Pondérations ESG
esg_weights:
  w_E: 0.50
  w_S: 0.30
  w_G: 0.20
  # Sous-poids E
  w_dpe: 0.40
  w_inondation: 0.30
  w_argile: 0.20
  w_ndvi: 0.10
  # Sous-poids S
  w_medical: 0.60
  w_mixite: 0.40

# ── ARIMA-GARCH-X (série temporelle DVF mensuel) ─────────────────────
garch:
  p: 1
  q: 1
  omega: 0.0005
  alpha: 0.10
  beta: 0.85
  delta_chf: 0.041   # Coefficient CHF/EUR volatilité dans GARCH-X

# ── Thresholds alertes ───────────────────────────────────────────────
alerts:
  rmse_eur_warning: 22000
  rmse_eur_critical: 28000
  score_deal_threshold: 750    # Score GexScore > 750 = "Deal Alert"
  chf_eur_upper: 1.02
  chf_eur_lower: 0.92

# ── Sources de données spécifiques à la zone ────────────────────────
data_sources:
  sitg_geneve: true            # Registre foncier cantonal (400 EUR/mois)
  sitg_activated_mrr: 490      # Activé seulement si MRR > ce seuil
  ofs_frontaliers: true        # Statistiques frontaliers BFS/OFS
  bns_chf_eur: true            # BNS CHF/EUR quotidien
  bruitparif_active: false     # Paris only — remplacer par IGN bruit pour Gex

# ── Pricing API B2B ──────────────────────────────────────────────────
pricing:
  b2c_monthly_eur: 99
  b2b_agence_monthly_eur: 490
  b2b_notaire_monthly_eur: 1490
  b2b_banque_monthly_eur: 1990
  b2b_institutional_monthly_eur: 4900
